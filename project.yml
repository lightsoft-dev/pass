name: Pass
options:
  bundleIdPrefix: dev.lightsoft
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  FlyingFox:
    url: https://github.com/swhitty/FlyingFox
    from: 0.20.0
  SwiftTerm:
    # Pin below 1.12 — later versions add a Metal GPU backend that needs the Metal Toolchain.
    # The default renderer is plenty for our attached-tmux terminal.
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: "1.11.2"
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: 1.3.0

targets:
  Pass:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/Pass
      # AppIcon.icns (generated from AppIcon-source.png via sips/iconutil — see BUILD.md)
      - path: Resources
        buildPhase: resources
      # Bundled example extensions — installable from Settings › Extensions. Folder reference
      # so scripts keep their executable bit and land as Resources/Extensions/<id>/.
      - path: Extensions
        buildPhase: resources
        type: folder
    dependencies:
      - package: KeyboardShortcuts
      - package: FlyingFox
      - package: FlyingFox
        product: FlyingSocks
      - package: SwiftTerm
      - target: PassShare
      # Build ordering only — passcli is copied into Contents/MacOS by the script below
      # (a tool target can't be linked or framework-embedded).
      - target: PassCli
        link: false
        embed: false
    info:
      path: Config/Info.plist
      properties:
        CFBundleName: Pass
        CFBundleDisplayName: Pass
        CFBundleIconFile: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSAppleEventsUsageDescription: "Pass opens tmux sessions in your terminal (Ghostty or Terminal) when you choose to attach."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lightsoft.pass
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Stable signing via the free Apple Development cert. Ad-hoc ("-") builds, but its
        # cdhash changes every build and macOS then refuses notifications ("not allowed").
        # A real Development identity gives a stable code identity so notifications work.
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: H66C2M66DC
        PROVISIONING_PROFILE_SPECIFIER: ""
        # non-sandboxed: must spawn tmux/git, reach /private/tmp tmux socket, read any repo.
        ENABLE_APP_SANDBOX: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        SWIFT_VERSION: "5.0"
    # passcli rides inside the app at Contents/MacOS/passcli (already signed by its own
    # target; script phases run before the app's code-sign step, so the seal covers it).
    # S6.3 validates this embed+signing combo on-device.
    postBuildScripts:
      - name: Embed passcli
        script: |
          cp -f "${BUILT_PRODUCTS_DIR}/passcli" "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/passcli"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/passcli
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/passcli

  # OS share sheet target: share text/URL/images from any app → "Pass" → add a note, pick a
  # session (or a project for a new one) → the payload lands in that agent as a message.
  # Talks to the running app over the loopback hook server (port 49817).
  PassShare:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/PassShare
      # The share sheet needs the icon INSIDE the appex — the container-app fallback is
      # unreliable on macOS (generic icon otherwise).
      - path: Resources/AppIcon.icns
        buildPhase: resources
    entitlements:
      # App extensions MUST be sandboxed — pluginkit silently refuses to register an
      # unsandboxed .appex. network.client lets it reach the app's loopback server; the
      # shared-file inbox lands in the extension's container (absolute paths still readable
      # by the unsandboxed app/agents).
      path: Config/PassShare.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    info:
      path: Config/PassShareInfo.plist
      properties:
        CFBundleName: Pass
        CFBundleDisplayName: Pass
        CFBundleIconFile: AppIcon
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: PassShare.ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 8
              NSExtensionActivationSupportsFileWithMaxCount: 8
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lightsoft.pass.share
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: H66C2M66DC
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: "NO"
        SWIFT_VERSION: "5.0"
        SKIP_INSTALL: "YES"

  # Agent-facing CLI (BROWSER.md Part B). Built as a plain tool, embedded into Pass.app by
  # the app target's "Embed passcli" script; ~/.pass/bin/passcli symlinks to it at runtime.
  PassCli:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/PassCli
    dependencies:
      - package: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: passcli
        PRODUCT_BUNDLE_IDENTIFIER: dev.lightsoft.pass.cli
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: H66C2M66DC
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: "NO"
        SWIFT_VERSION: "5.0"
        SKIP_INSTALL: "YES"

  PassTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/PassTests
    dependencies:
      - target: Pass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lightsoft.pass.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: H66C2M66DC
        SWIFT_VERSION: "5.0"

schemes:
  Pass:
    build:
      targets:
        Pass: all
        PassTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PassTests
