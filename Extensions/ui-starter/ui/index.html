<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pass UI Starter</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">PASS EXTENSION</p>
        <h1>UI Starter</h1>
      </div>
      <button id="notify" type="button">Notify</button>
    </header>

    <main>
      <section class="summary" aria-label="Session summary">
        <span id="session-count">0</span>
        <p>active sessions</p>
      </section>

      <section>
        <div class="section-title">
          <h2>Sessions</h2>
          <small id="updated-at">loading</small>
        </div>
        <div id="sessions" class="sessions"></div>
      </section>
    </main>
  </body>
</html>
